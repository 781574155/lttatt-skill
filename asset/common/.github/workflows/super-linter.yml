name: Lint

on:
  push:
    branches:
      - master
      - main

permissions: {}

jobs:
  lint:
    name: Lint
    runs-on: arc-runner-set-dind
    permissions:
      contents: write
      packages: read
      statuses: write
    steps:
      - name: Set Git to use HTTP/1.1
        run: git config --global http.version HTTP/1.1

      - name: Create GitHub App token
        uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ vars.LTTATT_READ_WRITE_APP_ID }}
          private-key: ${{ secrets.LTTATT_READ_WRITE_APP_PRIVATE_KEY }}

      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Load super-linter configuration
        run: grep -E -v '^[[:space:]]*$|^[[:space:]]*#' .super-linter.env >> "$GITHUB_ENV"

      - name: Super-linter
        uses: 781574155/super-linter@v8.3.0-tanqi
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Commit and push linting fixes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: fix linting issues"
          commit_user_name: super-linter[bot]
          commit_user_email: super-linter@bots.noreply.github.com
